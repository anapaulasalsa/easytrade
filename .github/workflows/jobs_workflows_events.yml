name: Dynatrace SDLC Ingest

on:
  workflow_run:
    types: [requested, completed]
  pull_request:
    types: [opened, closed, reopened, synchronize]

jobs:
  send_to_dynatrace:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Get workflow jobs
        if: github.event_name == 'workflow_run'
        run: |
          curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/jobs" \
            > jobs.json

      - name: Send workflow job events
        if: github.event_name == 'workflow_run'
        run: |
          jq -c '.jobs[]' jobs.json | while read job; do
            STATUS=$(echo "$job" | jq -r '.status')
            
            if [[ "$STATUS" == "completed" ]]; then
              ACTION="completed"
            elif [[ "$STATUS" == "in_progress" ]]; then
              ACTION="in_progress"
            else
              ACTION="queued"
            fi
            
            PAYLOAD=$(jq -n \
              --arg action "$ACTION" \
              --argjson job "$job" \
              --arg repo "$GITHUB_REPOSITORY" \
              --arg sender "$GITHUB_ACTOR" \
              '{
                action: $action,
                workflow_job: $job,
                repository: { full_name: $repo },
                sender: { login: $sender }
              }')
            
            curl -X POST "https://esa3431h.sprint.dynatracelabs.com/platform/ingest/custom/events.sdlc/github" \
              -H "Authorization: Api-Token ${{ secrets.DT_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              -H "X-GitHub-Event: workflow_job" \
              -d "$PAYLOAD"
          done

      - name: Send workflow_run event
        if: github.event_name == 'workflow_run'
        run: |
          curl -X POST "https://esa3431h.sprint.dynatracelabs.com/platform/ingest/custom/events.sdlc/github" \
            -H "Authorization: Api-Token ${{ secrets.DT_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: workflow_run" \
            -d '${{ toJson(github.event) }}'

      - name: Send pull_request event
        if: github.event_name == 'pull_request'
        run: |
          curl -X POST "https://esa3431h.sprint.dynatracelabs.com/platform/ingest/custom/events.sdlc/github" \
            -H "Authorization: Api-Token ${{ secrets.DT_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: pull_request" \
            -d '${{ toJson(github.event) }}'
